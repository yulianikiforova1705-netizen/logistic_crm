<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логистика CRM - Yulia Nikiforova</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; font-size: 13px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        
        /* Стили для нашей новой формы */
        .form-card { background: #eef2f5; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 4px; font-size: 12px; }
        .form-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        .status-sync { color: #28a745; font-weight: bold; font-size: 11px; }
        .extra-box { font-size: 11px; color: #666; background: #eee; padding: 2px 5px; border-radius: 3px; display: block; margin-top: 2px; }
        .margin-val { font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мониторинг рейсов</h1>

        <div class="form-card">
            <h3>Создать новый рейс</h3>
            <form id="add-order-form">
                <div class="form-grid">
                    <div class="form-group"><label>Дата заявки</label><input type="date" id="f-date" required></div>
                    <div class="form-group"><label>Клиент</label><input type="text" id="f-client" placeholder="Например: ООО Альфа" required></div>
                    <div class="form-group"><label>Подрядчик</label><input type="text" id="f-contractor" placeholder="ИП Петров" required></div>
                    <div class="form-group"><label>Маршрут</label><input type="text" id="f-route" placeholder="Москва - Казань" required></div>
                    <div class="form-group"><label>Ставка клиента (руб)</label><input type="number" id="f-client-rate" required></div>
                    <div class="form-group"><label>Ставка подрядчика (руб)</label><input type="number" id="f-contractor-rate" required></div>
                </div>
                <button type="submit">+ Добавить рейс в систему</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>1С</th>
                    <th>Даты</th>
                    <th>Клиент / Подрядчик</th>
                    <th>Авто / Тип</th>
                    <th>Маршрут</th>
                    <th>Ставки (Кл / Подр)</th>
                    <th>Доп. расходы</th>
                    <th>Маржа</th>
                </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
        </table>
    </div>

    <script>
        // Функция загрузки таблицы (вынесли отдельно, чтобы обновлять после добавления)
        function loadOrders() {
            fetch('/api/orders')
                .then(res => res.json())
                .then(data => {
                    const tableBody = document.getElementById('orders-table-body');
                    tableBody.innerHTML = ''; // Очищаем таблицу перед загрузкой

                    data.data.forEach(order => {
                        const totalExtra = order.extraExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                        const finalMargin = order.clientRate - order.contractorRate - totalExtra;

                        const row = `<tr>
                            <td class="status-sync">${order.sync1C}</td>
                            <td>${order.orderDate}<br>${order.loadDate}<br>${order.unloadDate}</td>
                            <td><strong>${order.clientName}</strong><br><em>${order.contractorName}</em></td>
                            <td>${order.carNumber}<br>${order.transportType}</td>
                            <td>${order.route}</td>
                            <td>${order.clientRate.toLocaleString()} / ${order.contractorRate.toLocaleString()} ${order.currency}</td>
                            <td>${order.extraExpenses.map(e => `<span class="extra-box">${e.category}: ${e.amount}</span>`).join('')}</td>
                            <td class="margin-val">${finalMargin.toLocaleString()} ${order.currency}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                });
        }

        // Загружаем заявки при открытии страницы
        loadOrders();

        // Логика отправки новой заявки
        document.getElementById('add-order-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Останавливаем стандартную перезагрузку страницы

            // Собираем данные из полей ввода
            const newOrderData = {
                orderDate: document.getElementById('f-date').value,
                clientName: document.getElementById('f-client').value,
                contractorName: document.getElementById('f-contractor').value,
                route: document.getElementById('f-route').value,
                clientRate: document.getElementById('f-client-rate').value,
                contractorRate: document.getElementById('f-contractor-rate').value
            };

            // Отправляем данные на сервер
            fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newOrderData)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    document.getElementById('add-order-form').reset(); // Очищаем форму
                    loadOrders(); // Перерисовываем таблицу с новыми данными!
                }
            });
        });
    </script>
</body>
</html>
