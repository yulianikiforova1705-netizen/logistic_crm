<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логистика CRM - Yulia Nikiforova</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; font-size: 13px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        .form-card { background: #eef2f5; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 4px; font-size: 12px; }
        .form-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        
        /* Стили для светофора */
        select.status-select { border: none; padding: 4px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; outline: none; font-size: 12px; }
        .status-yellow { background-color: #fff3cd; color: #856404; }
        .status-green { background-color: #d4edda; color: #155724; }
        .status-red { background-color: #f8d7da; color: #721c24; }
        
        .status-sync { color: #28a745; font-weight: bold; font-size: 11px; }
        .margin-val { font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мониторинг рейсов</h1>

        <div class="form-card">
            <h3>Создать новый рейс</h3>
            <form id="add-order-form">
                <div class="form-grid">
                    <div class="form-group"><label>Дата заявки</label><input type="date" id="f-date" required></div>
                    <div class="form-group"><label>Клиент</label><input type="text" id="f-client" required></div>
                    <div class="form-group"><label>Подрядчик</label><input type="text" id="f-contractor" required></div>
                    <div class="form-group"><label>Маршрут</label><input type="text" id="f-route" required></div>
                    <div class="form-group"><label>Ставка клиента</label><input type="number" id="f-client-rate" required></div>
                    <div class="form-group"><label>Ставка подрядчика</label><input type="number" id="f-contractor-rate" required></div>
                </div>
                <button type="submit">+ Добавить рейс</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Даты</th>
                    <th>Клиент / Подрядчик</th>
                    <th>Маршрут</th>
                    <th>Ставки (Кл / Подр)</th>
                    <th>Оплата (Светофор)</th>
                    <th>Маржа</th>
                </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
        </table>
    </div>

    <script>
        // Функция для отрисовки правильного цвета у селекта
        function getColorClass(status) {
            if(status === 'Оплачено') return 'status-green';
            if(status === 'Просрочка') return 'status-red';
            return 'status-yellow'; // По умолчанию Ожидание
        }

        // Загрузка таблицы
        function loadOrders() {
            fetch('/api/orders')
                .then(res => res.json())
                .then(data => {
                    const tableBody = document.getElementById('orders-table-body');
                    tableBody.innerHTML = ''; 

                    data.data.forEach(order => {
                        const finalMargin = order.clientRate - order.contractorRate;
                        const colorClass = getColorClass(order.paymentStatus);

                        const row = `<tr>
                            <td>${order.orderDate}</td>
                            <td><strong>${order.clientName}</strong><br><em>${order.contractorName}</em></td>
                            <td>${order.route}</td>
                            <td>${order.clientRate.toLocaleString()} / ${order.contractorRate.toLocaleString()}</td>
                            
                            <td>
                                <select class="status-select ${colorClass}" onchange="updatePaymentStatus(${order.id}, this.value)">
                                    <option value="Ожидание" ${order.paymentStatus === 'Ожидание' ? 'selected' : ''}>Ожидание</option>
                                    <option value="Оплачено" ${order.paymentStatus === 'Оплачено' ? 'selected' : ''}>Оплачено</option>
                                    <option value="Просрочка" ${order.paymentStatus === 'Просрочка' ? 'selected' : ''}>Просрочка</option>
                                </select>
                            </td>
                            
                            <td class="margin-val">${finalMargin.toLocaleString()}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                });
        }

        loadOrders();

        // Добавление новой заявки
        document.getElementById('add-order-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const newOrderData = {
                orderDate: document.getElementById('f-date').value,
                clientName: document.getElementById('f-client').value,
                contractorName: document.getElementById('f-contractor').value,
                route: document.getElementById('f-route').value,
                clientRate: document.getElementById('f-client-rate').value,
                contractorRate: document.getElementById('f-contractor-rate').value
            };

            fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newOrderData)
            }).then(res => res.json()).then(() => {
                document.getElementById('add-order-form').reset();
                loadOrders(); 
            });
        });

        // НОВАЯ ФУНКЦИЯ: Отправка измененного статуса на сервер
        function updatePaymentStatus(orderId, newStatus) {
            fetch(`/api/orders/${orderId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    loadOrders(); // Перерисовываем таблицу, чтобы цвет обновился
                }
            });
        }
    </script>
</body>
</html>
